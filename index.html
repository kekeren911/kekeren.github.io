<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级科学计算器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 计算器主面板 -->
        <div class="calculator-panel">
            <div class="calculator-header">
                <h1>科学计算器</h1>
                <div class="theme-selector">
                    <button class="theme-btn" data-theme="light" title="浅色主题">☀️</button>
                    <button class="theme-btn" data-theme="dark" title="深色主题">🌙</button>
                    <button class="theme-btn" data-theme="retro" title="复古主题">📟</button>
                </div>
            </div>

            <div class="display">
                <div class="expression" id="expression"></div>
                <div class="result" id="result">0</div>
                <div class="error-message" id="error-message"></div>
            </div>

            <div class="keypad">
                <!-- 科学函数按钮 -->
                <div class="scientific-keys">
                    <button class="btn btn-sci" data-action="function" data-value="sin(">sin</button>
                    <button class="btn btn-sci" data-action="function" data-value="cos(">cos</button>
                    <button class="btn btn-sci" data-action="function" data-value="tan(">tan</button>
                    <button class="btn btn-sci" data-action="function" data-value="log(">log</button>
                    <button class="btn btn-sci" data-action="function" data-value="sqrt(">√</button>
                    <button class="btn btn-sci" data-action="function" data-value="abs(">abs</button>
                    <button class="btn btn-sci" data-action="constant" data-value="PI">π</button>
                    <button class="btn btn-sci" data-action="constant" data-value="E">e</button>
                </div>

                <!-- 基本运算按钮 -->
                <div class="basic-keys">
                    <button class="btn btn-clear" data-action="clear">C</button>
                    <button class="btn btn-clear" data-action="backspace">⌫</button>
                    <button class="btn btn-op" data-action="operator" data-value="(">(</button>
                    <button class="btn btn-op" data-action="operator" data-value=")">)</button>

                    <button class="btn btn-num" data-action="number" data-value="7">7</button>
                    <button class="btn btn-num" data-action="number" data-value="8">8</button>
                    <button class="btn btn-num" data-action="number" data-value="9">9</button>
                    <button class="btn btn-op" data-action="operator" data-value="/">÷</button>

                    <button class="btn btn-num" data-action="number" data-value="4">4</button>
                    <button class="btn btn-num" data-action="number" data-value="5">5</button>
                    <button class="btn btn-num" data-action="number" data-value="6">6</button>
                    <button class="btn btn-op" data-action="operator" data-value="*">×</button>

                    <button class="btn btn-num" data-action="number" data-value="1">1</button>
                    <button class="btn btn-num" data-action="number" data-value="2">2</button>
                    <button class="btn btn-num" data-action="number" data-value="3">3</button>
                    <button class="btn btn-op" data-action="operator" data-value="-">−</button>

                    <button class="btn btn-num" data-action="number" data-value="0">0</button>
                    <button class="btn btn-num" data-action="number" data-value=".">.</button>
                    <button class="btn btn-sci" data-action="operator" data-value="^">^</button>
                    <button class="btn btn-op" data-action="operator" data-value="+">+</button>

                    <button class="btn btn-equals" data-action="equals" colspan="2">=</button>
                </div>
            </div>

            <button class="toggle-history" id="toggle-history" title="切换历史记录">
                📜 历史记录
            </button>
        </div>

        <!-- 历史记录面板 -->
        <div class="history-panel" id="history-panel">
            <div class="history-header">
                <h2>计算历史</h2>
                <button class="btn-clear-history" id="clear-history" title="清除历史记录">🗑️ 清除</button>
            </div>
            <div class="history-list" id="history-list">
                <!-- 历史记录项将动态添加 -->
            </div>
        </div>

        <!-- 函数绘图面板 -->
        <div class="plotter-panel">
            <div class="plotter-header">
                <h2>函数绘图</h2>
            </div>
            <div class="plotter-controls">
                <input type="text" id="function-input" placeholder="输入函数，例如: x^2, sin(x), x^3-2*x+1" value="x^2">
                <button class="btn-plot" id="plot-btn">绘制</button>
                <button class="btn-plot" id="clear-plot-btn">清除</button>
                <div class="zoom-controls">
                    <button class="btn-zoom" data-zoom="in">🔍+</button>
                    <button class="btn-zoom" data-zoom="out">🔍-</button>
                    <button class="btn-zoom" data-zoom="reset">↺</button>
                </div>
            </div>
            <div class="canvas-container">
                <canvas id="plotter-canvas"></canvas>
            </div>
            <div class="plotter-info">
                <p>支持的函数: sin, cos, tan, log, sqrt, abs, ^</p>
                <p>常量: PI, E</p>
                <p>示例: x^2, sin(x), x^3-2*x+1, log(x)</p>
            </div>
        </div>
    </div>

    <script src="calculator.js"></script>
    <script src="plotter.js"></script>
    <script src="app.js"></script>
</body>
</html>
