<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Notification System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="notification-container"></div>

  <div class="demo-panel">
    <h2>Notification System Demo</h2>
    <div class="button-group">
      <button onclick="notify('success', 'Operation completed!', 'Your file has been saved successfully.', 'high')">
        Success (High)
      </button>
      <button onclick="notify('success', 'Quick update available', 'A minor update is ready.', 'low')">
        Success (Low)
      </button>
      <button onclick="notify('error', 'Connection failed', 'Unable to reach the server. Please try again later.', 'high')">
        Error (High)
      </button>
      <button onclick="notify('error', 'Minor issue', 'A non-critical error occurred.', 'low')">
        Error (Low)
      </button>
      <button onclick="notify('info', 'Did you know?', 'You can click any notification to dismiss it early.', 'low')">
        Info (Low)
      </button>
      <button onclick="notify('info', 'System maintenance scheduled', 'The system will be briefly unavailable at midnight.', 'medium')">
        Info (Medium)
      </button>
      <button onclick="notify('warning', 'Storage almost full', 'You have used 90% of your available storage.', 'medium')">
        Warning (Medium)
      </button>
      <button onclick="triggerBurst()">
        Burst (5 random)
      </button>
    </div>

    <div class="stats" id="stats">
      Active: <span id="stat-active">0</span> &nbsp;|&nbsp;
      Total: <span id="stat-total">0</span> &nbsp;|&nbsp;
      Dismissed: <span id="stat-dismissed">0</span>
    </div>
  </div>

  <script src="notify.js"></script>
</body>
</html>
